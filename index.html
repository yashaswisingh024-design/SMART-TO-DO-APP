<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Smart To-Do App</title>
  <link rel="stylesheet" href="style.css">
</head>

<body>
  <div class="container">

    <h1>📝 Smart To-Do</h1>

    <!-- INPUT -->
    <div class="input-box">
      <input type="text" id="taskInput" placeholder="Enter a task..." autocomplete="off">
      <button id="addTaskBtn" type="button" aria-label="Add task">Add</button>
    </div>

    <!-- CONTROLS -->
    <div class="controls">
      <input type="text" id="searchInput" placeholder="Search tasks..." autocomplete="off">

      <select id="filter">
        <option value="all">All</option>
        <option value="completed">Completed</option>
        <option value="pending">Pending</option>
      </select>

      <button class="dark-btn" type="button" aria-label="Toggle dark mode">🌙</button>
    </div>

    <!-- TASK LIST -->
    <ul id="taskList"></ul>

    <p class="empty" id="emptyText">No tasks yet 🎉</p>

  </div>

  <script src="script.js"></script>
</body>
</html>
